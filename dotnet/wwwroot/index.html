<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACH/eCheck Payments - Direct Entry</title>
    <style>
        /* Center the form horizontally and set a max width */
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            font-size: 0.79em;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Form Heading */
        h1 {
            font-size: 2em;
            margin-bottom: 0.2em;
        }

        h2 {
            font-size: 1.2em;
            margin-bottom: 1em;
        }

        /* General Form Styles */
        form {
            border-top: 3px solid #000000;
            padding-top: 20px;
        }

        /* Input Fields */
        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="number"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            box-sizing: border-box;
            font-size: 16px;
            border: 1px solid #cccccc;
            border-radius: 4px;
        }

        /* Row layout for account/routing numbers */
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .row .half {
            flex: 1 1 48%;
        }

        /* Submit Button */
        button {
            width: 100%;
            background-color: #0077cc;
            color: white;
            padding: 14px 20px;
            margin-top: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #005fa3;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        /* Security notice */
        .security-notice {
            background-color: #f0f8ff;
            border: 1px solid #0077cc;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .security-notice strong {
            color: #0077cc;
        }

        /* Error/Success Messages */
        .message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .error {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c00;
        }

        .success {
            background-color: #efe;
            border: 1px solid #cfc;
            color: #060;
        }

        /* Responsive Adjustments */
        @media (max-width: 600px) {
            .row {
                flex-direction: column;
            }
            .row .half {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ACH/eCheck Payments</h1>
        <h2>Electronic Check Payment Form - Direct Entry</h2>
        
        <div class="security-notice">
            <strong>Security Notice:</strong> This form demonstrates direct bank account data entry for testing purposes. 
            In production, always use tokenization to protect sensitive banking information.
        </div>
        
        <div id="message-container"></div>
        
        <form id="payment-form" action="/process-payment" method="POST">
            <div>
                <label for="amount">Amount ($):</label>
                <input type="number" id="amount" name="amount" min="0.01" step="0.01" value="10.00" required>
            </div>
            
            <div>
                <label for="check_holder_name">Account Holder Name:</label>
                <input type="text" id="check_holder_name" name="check_holder_name" placeholder="John Doe" required>
            </div>
            
            <div class="row">
                <div class="half">
                    <label for="account_number">Account Number:</label>
                    <input type="text" id="account_number" name="account_number" placeholder="1234567890" pattern="[0-9]+" maxlength="17" required>
                </div>
                <div class="half">
                    <label for="routing_number">Routing Number:</label>
                    <input type="text" id="routing_number" name="routing_number" placeholder="021000021" pattern="[0-9]{9}" maxlength="9" required>
                </div>
            </div>
            
            <div class="row">
                <div class="half">
                    <label for="account_type">Account Type:</label>
                    <select id="account_type" name="account_type" required>
                        <option value="">Select Account Type</option>
                        <option value="checking">Checking</option>
                        <option value="savings">Savings</option>
                    </select>
                </div>
                <div class="half">
                    <label for="check_type">Check Type:</label>
                    <select id="check_type" name="check_type" required>
                        <option value="">Select Check Type</option>
                        <option value="personal">Personal</option>
                        <option value="business">Business</option>
                    </select>
                </div>
            </div>
            
            <div>
                <label for="billing_zip">Billing Zip Code:</label>
                <input type="text" id="billing_zip" name="billing_zip" placeholder="12345" maxlength="10">
            </div>
            
            <button type="submit" id="submit-button">Process Payment</button>
        </form>
    </div>

    <script>
        // Form validation and submission handling
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('payment-form');
            const submitButton = document.getElementById('submit-button');
            const messageContainer = document.getElementById('message-container');
            
            // Real-time validation for routing number (9 digits)
            const routingNumberInput = document.getElementById('routing_number');
            routingNumberInput.addEventListener('input', function(e) {
                const value = e.target.value.replace(/\D/g, ''); // Remove non-digits
                e.target.value = value;
                
                if (value.length === 9) {
                    // Simple routing number checksum validation
                    const isValid = validateRoutingNumber(value);
                    e.target.style.borderColor = isValid ? '#4CAF50' : '#f44336';
                } else {
                    e.target.style.borderColor = '#cccccc';
                }
            });
            
            // Real-time validation for account number (digits only)
            const accountNumberInput = document.getElementById('account_number');
            accountNumberInput.addEventListener('input', function(e) {
                const value = e.target.value.replace(/\D/g, ''); // Remove non-digits
                e.target.value = value;
            });
            
            function showMessage(message, type) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${type}`;
                messageDiv.textContent = message;
                messageContainer.innerHTML = '';
                messageContainer.appendChild(messageDiv);
                
                // Scroll to message
                messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            // Simple routing number validation using checksum algorithm
            function validateRoutingNumber(routingNumber) {
                if (routingNumber.length !== 9) return false;
                
                const digits = routingNumber.split('').map(Number);
                const checksum = (
                    3 * (digits[0] + digits[3] + digits[6]) +
                    7 * (digits[1] + digits[4] + digits[7]) +
                    1 * (digits[2] + digits[5] + digits[8])
                ) % 10;
                
                return checksum === 0;
            }
        });
    </script>
</body>
</html>
